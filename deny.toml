[graph]
# Graph targets to include when checking
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "x86_64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

[advisories]
# The path where the advisory database is cloned/fetched into
db-path = "~/.cargo/advisory-db"
# The url(s) of the advisory database to use
db-urls = ["https://github.com/rustsec/advisory-db"]
# A list of advisory IDs to ignore
ignore = [
    #"RUSTSEC-0000-0000",
]

[licenses]
# List of explicitly allowed licenses
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
]
# The confidence threshold for license detection
confidence-threshold = 0.8
# Allow 1 or more licenses on a per-crate basis
exceptions = [
    #{ name = "zstd-sys", version = "*", allow = ["MIT"] },
]

[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "warn"
# Lint level for when a crate version requirement is `*`
wildcards = "allow"
# The graph highlighting used when creating dotgraphs
highlight = "all"
# List of crates that are allowed
allow = [
    #{ name = "ansi_term", version = "=0.11.0" },
]
# List of crates to deny
deny = [
    #{ name = "ansi_term", version = "=0.11.0" },
]
# Crates to skip during duplicate detection
skip = [
    #{ name = "ansi_term", version = "=0.11.0" },
]
# Skip entire crate tree
skip-tree = [
    #{ name = "ansi_term", version = "=0.11.0" },
]

[sources]
# Lint level for crates from unknown registries
unknown-registry = "warn"
# Lint level for crates from unknown git repositories
unknown-git = "warn"
# List of allowed crate registries
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# List of allowed git repositories
allow-git = []
