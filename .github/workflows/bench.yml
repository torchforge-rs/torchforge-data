name: Benchmarks

on:
  workflow_dispatch:
    # Allow manual triggering with optional parameters
    inputs:
      branch:
        description: 'Branch to benchmark (default: main)'
        required: false
        default: 'main'
      iterations:
        description: 'Number of benchmark iterations (default: 10)'
        required: false
        default: '10'

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch || 'main' }}
    
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustc, cargo, llvm-tools-preview
    
    - name: Install cargo-criterion
      run: cargo install cargo-criterion
    
    - name: Run benchmarks
      run: |
        ITERATIONS=${{ github.event.inputs.iterations || '10' }}
        cargo bench -- --sample-size $ITERATIONS
    
    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results-${{ github.sha }}
        path: |
          target/criterion/
          **/target/criterion/
        retention-days: 30
    
    - name: Generate benchmark summary
      run: |
        if [ -d "target/criterion" ]; then
          echo "## Benchmark Results" > benchmark-summary.md
          echo "" >> benchmark-summary.md
          echo "Benchmark results for branch: ${{ github.event.inputs.branch || 'main' }}" >> benchmark-summary.md
          echo "Iterations: ${{ github.event.inputs.iterations || '10' }}" >> benchmark-summary.md
          echo "" >> benchmark-summary.md
          
          # List all benchmark reports
          find target/criterion -name "report" -type d | while read dir; do
            bench_name=$(echo "$dir" | sed 's|.*target/criterion/||' | sed 's|/report||')
            echo "### $bench_name" >> benchmark-summary.md
            echo "Report available in artifact: \`benchmark-results-${{ github.sha }}\`" >> benchmark-summary.md
            echo "" >> benchmark-summary.md
          done
          
          cat benchmark-summary.md
        else
          echo "No benchmark results found"
        fi
    
    - name: Post benchmark summary
      if: always()
      run: |
        if [ -f "benchmark-summary.md" ]; then
          echo "# Benchmark Results" >> $GITHUB_STEP_SUMMARY
          cat benchmark-summary.md >> $GITHUB_STEP_SUMMARY
        fi
